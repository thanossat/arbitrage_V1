<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Διαχείριση Δεδομένων Sheet</title>
    <style>
        :root {
            --primary: #3d2b1f;
            --bg-bet: #fdf8f2;
            --bg-mov: #faf3e8;
            --success: #2d7a4f;
            --danger: #b03a2e;
        }
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f0ea;
            color: var(--primary);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            text-align: center;
            margin-top: 0;
            color: var(--primary);
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: #e8e2da;
            cursor: pointer;
            font-weight: bold;
            border-radius: 6px;
            transition: 0.3s;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        textarea { resize: vertical; height: 60px; }
        button.submit-btn {
            width: 100%;
            padding: 12px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button.submit-btn:hover { opacity: 0.9; }
        .hidden { display: none; }
        #message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
        .msg-success { background: #dff2e8; color: var(--success); }
        .msg-error { background: #faeaea; color: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <h2>📋 Ενημέρωση Google Sheet</h2>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('bet')">📋 Στοίχημα</button>
        <button class="tab-btn" onclick="switchTab('movement')">💰 Κίνηση Ταμείου</button>
    </div>

    <form id="dataForm">
        <input type="hidden" id="dataType" value="bet">

        <div class="form-group">
            <label>Ημερομηνία & Ώρα</label>
            <input type="datetime-local" id="timestamp" required>
        </div>

        <div id="betFields">
            <div class="form-group">
                <label>Αγώνας (Match)</label>
                <input type="text" id="match" placeholder="π.χ. Ολυμπιακός - Παναθηναϊκός">
            </div>
            <div class="form-group">
                <label>Αγορά (Market)</label>
                <input type="text" id="market" placeholder="π.χ. 1 (Τελικό Αποτέλεσμα)">
            </div>
            <div class="form-group">
                <label>Ποντάρισμα (Stake)</label>
                <input type="number" step="0.01" id="totalStake" placeholder="0.00">
            </div>
            <div class="form-group">
                <label>Νικητής (Winner)</label>
                <input type="text" id="winner" placeholder="π.χ. Ολυμπιακός">
            </div>
            <div class="form-group">
                <label>Απόδοση (Odds)</label>
                <input type="number" step="0.01" id="odds" placeholder="1.85">
            </div>
            <div class="form-group">
                <label>Καθαρό P/L (Net Profit/Loss)</label>
                <input type="number" step="0.01" id="netPL" placeholder="Θετικό ή αρνητικό ποσό">
            </div>
            <div class="form-group">
                <label>Τύπος Στοιχήματος (Bet Type)</label>
                <input type="text" id="betType" placeholder="π.χ. Μονό, Παρολί">
            </div>
        </div>

        <div id="movementFields" class="hidden">
            <div class="form-group">
                <label>Τύπος Κίνησης (Mov. Type)</label>
                <select id="movType">
                    <option value="Κατάθεση">💰 Κατάθεση</option>
                    <option value="Ανάληψη">💸 Ανάληψη</option>
                    <option value="Bonus">🎁 Bonus</option>
                </select>
            </div>
            <div class="form-group">
                <label>Ποσό (Amount)</label>
                <input type="number" step="0.01" id="amount" placeholder="0.00">
            </div>
        </div>

        <div class="form-group">
            <label>Σημείωση (Note)</label>
            <textarea id="note" placeholder="Προαιρετικά σχόλια..."></textarea>
        </div>

        <button type="submit" class="submit-btn">Αποστολή Καταχώρησης</button>
    </form>

    <div id="message"></div>
</div>

<script>
    // ⚠️ ΠΡΟΣΟΧΗ: Βάλε εδώ το δικό σου Web App URL που αντέγραψες από το Google Apps Script!
    const WEB_APP_URL = "ΕΔΩ_ΒΑΖΕΙΣ_ΤΟ_URL_ΣΟΥ";

    // Βάζει αυτόματα την τρέχουσα ημερομηνία και ώρα στο input
    window.onload = function() {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('timestamp').value = now.toISOString().slice(0,16);
    };

    // Εναλλαγή καρτελών (Tabs)
    function switchTab(type) {
        document.getElementById('dataType').value = type;
        const betFields = document.getElementById('betFields');
        const movFields = document.getElementById('movementFields');
        const buttons = document.querySelectorAll('.tab-btn');

        if (type === 'bet') {
            betFields.classList.remove('hidden');
            movFields.classList.add('hidden');
            buttons[0].classList.add('active');
            buttons[1].classList.remove('active');
        } else {
            betFields.classList.add('hidden');
            movFields.classList.remove('hidden');
            buttons[0].classList.remove('active');
            buttons[1].classList.add('active');
        }
    }

    // Διαχείριση της υποβολής της φόρμας
    document.getElementById('dataForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const msgDiv = document.getElementById('message');
        msgDiv.style.display = 'none';
        
        if (WEB_APP_URL === "ΕΔΩ_ΒΑΖΕΙΣ_ΤΟ_URL_ΣΟΥ" || !WEB_APP_URL) {
            showFormMessage("Σφάλμα: Δεν έχεις ορίσει το WEB_APP_URL στον κώδικα!", "error");
            return;
        }

        const type = document.getElementById('dataType').value;
        let payload = {
            type: type,
            timestamp: new Date(document.getElementById('timestamp').value).getTime(),
            note: document.getElementById('note').value
        };

        // Συλλογή δεδομένων ανάλογα με το tab
        if (type === 'bet') {
            payload.match = document.getElementById('match').value;
            payload.market = document.getElementById('market').value;
            payload.totalStake = parseFloat(document.getElementById('totalStake').value) || 0;
            payload.winner = document.getElementById('winner').value;
            payload.odds = parseFloat(document.getElementById('odds').value) || 0;
            payload.netPL = parseFloat(document.getElementById('netPL').value) || 0;
            payload.betType = document.getElementById('betType').value;
        } else {
            payload.movType = document.getElementById('movType').value;
            let amt = parseFloat(document.getElementById('amount').value) || 0;
            // Αν είναι ανάληψη, αποθηκεύεται ως αρνητικό ποσό αυτόματα
            if (payload.movType === "Ανάληψη" && amt > 0) amt = -amt;
            payload.amount = amt;
        }

        showFormMessage("Αποστολή δεδομένων...", "success");

        // Αποστολή στο Google Apps Script (χρησιμοποιώντας POST)
        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors', // Απαραίτητο για το Google Apps Script Web App bypass CORS
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(() => {
            showFormMessage("Η καταχώρηση έγινε επιτυχώς!", "success");
            // Καθαρισμός φορμών (εκτός της ώρας)
            document.getElementById('match').value = '';
            document.getElementById('market').value = '';
            document.getElementById('totalStake').value = '';
            document.getElementById('winner').value = '';
            document.getElementById('odds').value = '';
            document.getElementById('netPL').value = '';
            document.getElementById('betType').value = '';
            document.getElementById('amount').value = '';
            document.getElementById('note').value = '';
        })
        .catch(error => {
            showFormMessage("Σφάλμα κατά την αποστολή: " + error.message, "error");
        });
    });

    function showFormMessage(text, type) {
        const msgDiv = document.getElementById('message');
        msgDiv.innerText = text;
        msgDiv.style.display = 'block';
        if (type === 'success') {
            msgDiv.className = 'msg-success';
        } else {
            msgDiv.className = 'msg-error';
        }
    }
</script>

</body>
</html>
