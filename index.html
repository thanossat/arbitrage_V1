<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dutch Calculator</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #0f0f0f; --bg2: #1a1a1a; --bg3: #222;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
    --text: #f0f0f0; --text2: #999; --text3: #555;
    --green: #4ade80; --green-bg: rgba(74,222,128,0.1);
    --red: #f87171;   --red-bg: rgba(248,113,113,0.1);
    --amber: #fbbf24; --amber-bg: rgba(251,191,36,0.1);
    --blue: #60a5fa;  --blue-bg: rgba(96,165,250,0.1);
    --radius: 10px; --radius-sm: 6px;
  }
  .tg-light {
    --bg:#f5f5f5; --bg2:#fff; --bg3:#ebebeb;
    --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.15);
    --text:#1a1a1a; --text2:#666; --text3:#aaa;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;
    background:#111;color:var(--text);font-size:14px;min-height:100vh;padding-bottom:4rem}
  .page-wrap{max-width:480px;margin:0 auto;background:var(--bg);min-height:100vh}

  header{padding:1rem 1rem 0.75rem;border-bottom:0.5px solid var(--border);
    display:flex;align-items:center;gap:10px;position:sticky;top:0;
    background:var(--bg);z-index:10}
  .logo{width:32px;height:32px;background:var(--blue-bg);border:0.5px solid var(--border2);
    border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
  header h1{font-size:16px;font-weight:600}
  header .sub{font-size:12px;color:var(--text2)}

  .content{padding:0.75rem 1rem}
  .card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);
    padding:0.875rem 1rem;margin-bottom:0.625rem}
  .card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;
    color:var(--text2);margin-bottom:0.75rem}

  .field-row{display:flex;align-items:center;gap:8px;margin-bottom:0.5rem}
  .field-row:last-child{margin-bottom:0}
  .field-row label{font-size:13px;color:var(--text2);min-width:110px;flex-shrink:0}
  input[type=number],input[type=text],select,textarea{
    background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--radius-sm);
    color:var(--text);font-size:13px;padding:7px 10px;outline:none;transition:border-color .15s;
    -webkit-appearance:none}
  input:focus,select:focus,textarea:focus{border-color:var(--blue)}
  select{width:100%}
  .setup-inputs{display:flex;gap:8px;align-items:center}
  .setup-inputs input{width:80px}
  .unit{font-size:12px;color:var(--text2)}

  .legs-header{display:grid;grid-template-columns:1fr 1fr 80px;gap:6px;margin-bottom:4px}
  .legs-header span{font-size:11px;color:var(--text3);font-weight:500;
    text-transform:uppercase;letter-spacing:.04em;padding:0 2px}
  .leg-row-wrap{display:grid;grid-template-columns:1fr 1fr 80px;gap:6px;
    align-items:center;margin-bottom:6px}
  .leg-left{display:flex;flex-direction:column;gap:4px}
  .leg-left input{width:100%}
  .leg-odds{width:100%;font-size:15px;font-weight:600;text-align:center}
  .leg-stake{text-align:right;font-size:13px;font-weight:600;padding-right:4px;color:var(--text2)}

  .kl-toggle-row{display:flex;align-items:center;justify-content:space-between;
    padding:6px 0;border-top:0.5px solid var(--border);margin-top:6px}
  .kl-label{font-size:13px;color:var(--text)}
  .kl-sub{font-size:11px;color:var(--text2);margin-top:1px}
  .kl-stake-disp{font-size:13px;font-weight:600;color:var(--amber)}
  .toggle-switch{position:relative;width:40px;height:22px;flex-shrink:0;margin-left:10px}
  .toggle-switch input{opacity:0;width:0;height:0;position:absolute}
  .toggle-track{position:absolute;inset:0;background:var(--bg3);
    border:0.5px solid var(--border2);border-radius:11px;cursor:pointer;transition:background .2s}
  .toggle-track::after{content:'';position:absolute;width:16px;height:16px;
    background:var(--text2);border-radius:50%;top:2px;left:2px;transition:transform .2s,background .2s}
  .toggle-switch input:checked+.toggle-track{background:var(--amber-bg);border-color:var(--amber)}
  .toggle-switch input:checked+.toggle-track::after{transform:translateX(18px);background:var(--amber)}

  .add-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;
    padding:8px;background:var(--bg3);border:0.5px dashed var(--border2);
    border-radius:var(--radius-sm);color:var(--text2);font-size:13px;cursor:pointer;margin-top:8px}
  .add-btn:active{background:var(--bg2)}

  .metrics{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:0.625rem}
  .metric-card{background:var(--bg2);border:0.5px solid var(--border);
    border-radius:var(--radius);padding:0.75rem}
  .metric-card .mlabel{font-size:11px;color:var(--text2);margin-bottom:4px}
  .metric-card .mvalue{font-size:22px;font-weight:600}
  .metric-card.green{border-color:rgba(74,222,128,.3);background:var(--green-bg)}
  .metric-card.green .mvalue{color:var(--green)}
  .metric-card.red{border-color:rgba(248,113,113,.3);background:var(--red-bg)}
  .metric-card.red .mvalue{color:var(--red)}
  .metric-card.amber{border-color:rgba(251,191,36,.3);background:var(--amber-bg)}
  .metric-card.amber .mvalue{color:var(--amber)}

  .status-badge{display:flex;align-items:center;gap:8px;padding:10px 14px;
    border-radius:var(--radius);font-size:13px;font-weight:500;margin-bottom:0.625rem}
  .status-badge.arb{background:var(--green-bg);color:var(--green);border:0.5px solid rgba(74,222,128,.3)}
  .status-badge.partial{background:var(--amber-bg);color:var(--amber);border:0.5px solid rgba(251,191,36,.3)}
  .status-badge.noarb{background:var(--red-bg);color:var(--red);border:0.5px solid rgba(248,113,113,.3)}

  .results-table{width:100%;border-collapse:collapse;font-size:12px}
  .results-table th{text-align:left;color:var(--text3);font-weight:500;padding:4px 6px;
    border-bottom:0.5px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.04em}
  .results-table td{padding:8px 6px;border-bottom:0.5px solid var(--border);vertical-align:middle}
  .results-table tr:last-child td{border-bottom:none}
  .net-pos{color:var(--green);font-weight:600}
  .net-neg{color:var(--red)}
  .net-warn{color:var(--amber);font-weight:600}
  .type-pill{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500}
  .type-auto{background:var(--bg3);color:var(--text2)}
  .type-kl{background:var(--amber-bg);color:var(--amber)}
  .footnote{font-size:11px;color:var(--text2);margin-top:8px;line-height:1.5}

  /* ── Action buttons ── */
  .action-bar{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:0.625rem}
  .btn{padding:11px 8px;border-radius:var(--radius);font-size:13px;font-weight:600;
    cursor:pointer;border:none;text-align:center;transition:opacity .15s}
  .btn:active{opacity:.75}
  .btn-green{background:var(--green-bg);color:var(--green);border:0.5px solid rgba(74,222,128,.4)}
  .btn-amber{background:var(--amber-bg);color:var(--amber);border:0.5px solid rgba(251,191,36,.4)}
  .btn-blue{background:var(--blue-bg);color:var(--blue);border:0.5px solid rgba(96,165,250,.4)}
  .btn-full{grid-column:1/-1}

  /* ── Modal ── */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);
    display:flex;align-items:flex-end;justify-content:center;z-index:100;
    opacity:0;pointer-events:none;transition:opacity .2s}
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal{background:var(--bg2);border-radius:16px 16px 0 0;width:100%;max-width:480px;
    padding:1.25rem 1rem 2rem;transform:translateY(100%);transition:transform .25s}
  .modal-overlay.open .modal{transform:translateY(0)}
  .modal-title{font-size:15px;font-weight:700;margin-bottom:1rem;
    display:flex;align-items:center;justify-content:space-between}
  .modal-close{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:0 4px}
  .modal-section{margin-bottom:0.875rem}
  .modal-section label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px}
  .modal-section input,.modal-section select,.modal-section textarea{width:100%}
  .modal-section textarea{resize:none;height:60px;line-height:1.4}
  .winner-grid{display:grid;gap:6px}
  .winner-btn{padding:10px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;
    cursor:pointer;border:0.5px solid var(--border2);background:var(--bg3);color:var(--text);
    text-align:left;transition:all .15s}
  .winner-btn:hover,.winner-btn.selected{background:var(--green-bg);color:var(--green);
    border-color:rgba(74,222,128,.5)}
  .winner-btn .wb-odds{font-size:11px;color:var(--text2);float:right}
  .winner-btn.selected .wb-odds{color:var(--green)}

  .mov-type-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:0.875rem}
  .mov-btn{padding:10px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;
    cursor:pointer;border:0.5px solid var(--border2);background:var(--bg3);
    color:var(--text2);text-align:center;transition:all .15s}
  .mov-btn.dep.sel{background:var(--green-bg);color:var(--green);border-color:rgba(74,222,128,.5)}
  .mov-btn.wit.sel{background:var(--red-bg);color:var(--red);border-color:rgba(248,113,113,.5)}

  .submit-btn{width:100%;padding:13px;border-radius:var(--radius);font-size:14px;
    font-weight:700;cursor:pointer;border:none;margin-top:0.5rem;transition:opacity .15s}
  .submit-btn:active{opacity:.8}
  .submit-btn.green{background:var(--green);color:#000}
  .submit-btn.amber{background:var(--amber);color:#000}
  .submit-btn:disabled{opacity:.4;cursor:not-allowed}

  .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius);
    padding:10px 18px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;
    pointer-events:none;z-index:200;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.ok{border-color:rgba(74,222,128,.5);color:var(--green)}
  .toast.err{border-color:rgba(248,113,113,.5);color:var(--red)}
</style>
</head>
<body>
<div class="page-wrap">

<header>
  <div class="logo">⚡</div>
  <div>
    <h1>Dutch Calculator</h1>
    <div class="sub">Arbitrage &amp; dutching</div>
  </div>
</header>

<div class="content">

  <!-- SETUP -->
  <div class="card">
    <div class="card-title">Setup</div>
    <div class="field-row">
      <label>Αγορά</label>
      <select id="market">
        <option value="3">1X2 (3 αποτελέσματα)</option>
        <option value="2">H2H (2 αποτελέσματα)</option>
        <option value="custom">Custom</option>
      </select>
    </div>
    <div class="field-row">
      <label>Συνολικό ποντάρισμα</label>
      <div class="setup-inputs">
        <span class="unit">€</span>
        <input type="number" id="totalStake" value="50" min="1" step="1">
      </div>
    </div>
    <div class="field-row">
      <label>% γνωστής απώλειας</label>
      <div class="setup-inputs">
        <input type="number" id="lossPercent" value="20" min="1" max="99" step="1" style="width:60px">
        <span class="unit">%</span>
      </div>
    </div>
  </div>

  <!-- LEGS -->
  <div class="card">
    <div class="card-title">Αποτελέσματα & αποδόσεις</div>
    <div class="legs-header">
      <span>Αποτέλεσμα / Book</span><span>Απόδοση</span><span>Ποντ.</span>
    </div>
    <div id="legsContainer"></div>
    <button class="add-btn" id="addLegBtn">+ Προσθήκη αποτελέσματος</button>
    <div id="klToggles"></div>
  </div>

  <!-- METRICS -->
  <div id="metricsArea" style="display:none">
    <div class="metrics" id="metricsGrid"></div>
    <div id="statusBadge"></div>
    <div class="card">
      <div class="card-title">Ανάλυση</div>
      <table class="results-table" id="resultsTable"></table>
      <p class="footnote" id="footnote"></p>
    </div>

    <!-- ACTION BUTTONS -->
    <div class="action-bar">
      <button class="btn btn-green" id="btnRecord">✓ Καταχώρηση αποτελέσματος</button>
      <button class="btn btn-amber" id="btnMovement">↕ Κατάθεση / Ανάληψη</button>
    </div>
  </div>

  <!-- Movement button always visible -->
  <div id="movAlways">
    <button class="btn btn-amber btn-full" id="btnMovementAlways" style="width:100%;margin-top:4px">↕ Κατάθεση / Ανάληψη</button>
  </div>

</div><!-- /content -->

<!-- ── MODAL: Καταχώρηση αποτελέσματος ── -->
<div class="modal-overlay" id="modalRecord">
  <div class="modal">
    <div class="modal-title">
      ✓ Καταχώρηση αποτελέσματος
      <button class="modal-close" data-close="modalRecord">✕</button>
    </div>

    <div class="modal-section">
      <label>Αγώνας</label>
      <input type="text" id="recMatch" placeholder="π.χ. Man Utd - Arsenal">
    </div>

    <div class="modal-section">
      <label>Νικητής</label>
      <div class="winner-grid" id="winnerGrid"></div>
    </div>

    <div class="modal-section">
      <label>Σημείωση (προαιρετικό)</label>
      <textarea id="recNote" placeholder="π.χ. late goal, VAR..."></textarea>
    </div>

    <button class="submit-btn green" id="btnSubmitRecord">Αποθήκευση στο Sheet</button>
  </div>
</div>

<!-- ── MODAL: Κατάθεση / Ανάληψη ── -->
<div class="modal-overlay" id="modalMovement">
  <div class="modal">
    <div class="modal-title">
      ↕ Κατάθεση / Ανάληψη
      <button class="modal-close" data-close="modalMovement">✕</button>
    </div>

    <div class="mov-type-row">
      <button class="mov-btn dep sel" id="movDep" data-mov="dep">▲ Κατάθεση</button>
      <button class="mov-btn wit"     id="movWit" data-mov="wit">▼ Ανάληψη</button>
    </div>

    <div class="modal-section">
      <label>Ποσό (€)</label>
      <input type="number" id="movAmount" min="0.01" step="0.5" placeholder="π.χ. 50">
    </div>

    <div class="modal-section">
      <label>Σημείωση (προαιρετικό)</label>
      <input type="text" id="movNote" placeholder="π.χ. Μηνιαία ανανέωση">
    </div>

    <button class="submit-btn amber" id="btnSubmitMovement">Αποθήκευση στο Sheet</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyG63um53dMtPIjTm0_-h1x35OxoQjIu_jLkgHWTeDqoNrnh4pWHlLnAk2JjDBFmDD8Vw/exec";

const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); if (tg.colorScheme==='light') document.body.classList.add('tg-light'); }

// ── State ──
const D3 = [{label:'Home (H)',book:'Stoiximan',odds:'2.10',kl:false},{label:'Draw (X)',book:'Novibet',odds:'3.40',kl:false},{label:'Away (A)',book:'Betsson',odds:'3.60',kl:false}];
const D2 = [{label:'Home',book:'Stoiximan',odds:'1.90',kl:false},{label:'Away',book:'Novibet',odds:'2.05',kl:false}];
let legs = JSON.parse(JSON.stringify(D3));
let lastCalc = null;
let selectedWinner = null;
let movType = 'dep';

const getTotal   = () => parseFloat(document.getElementById('totalStake').value)||0;
const getLossPct = () => (parseFloat(document.getElementById('lossPercent').value)||20)/100;
const parseOdds  = s  => parseFloat((s||'').replace(',','.'))||0;
const klStake    = (odds,total,lp) => (total*(1-lp))/odds;

// ── Build UI ──
function buildUI() {
  const container = document.getElementById('legsContainer');
  const klDiv     = document.getElementById('klToggles');
  container.innerHTML = ''; klDiv.innerHTML = '';
  const total = getTotal(), lp = getLossPct();
  document.querySelectorAll('.kl-pct').forEach(el=>el.textContent=Math.round(lp*100));

  legs.forEach((leg, i) => {
    const row = document.createElement('div');
    row.className = 'leg-row-wrap'; row.dataset.i = i;

    const left = document.createElement('div'); left.className = 'leg-left';
    const inLabel = makeInput('text', leg.label, 'label', i, '13px');
    inLabel.placeholder = 'Αποτέλεσμα';
    const inBook  = makeInput('text', leg.book,  'book',  i, '12px');
    inBook.placeholder = 'Bookmaker'; inBook.style.color = 'var(--text2)';
    left.append(inLabel, inBook);

    const inOdds = makeInput('text', leg.odds, 'odds', i, '15px');
    inOdds.className = 'leg-odds'; inOdds.inputMode = 'decimal';

    const stakeCell = document.createElement('div');
    stakeCell.className = 'leg-stake'; stakeCell.dataset.stakeDisplay = i;

    row.append(left, inOdds, stakeCell);
    container.appendChild(row);

    const klRow = document.createElement('div');
    klRow.className = 'kl-toggle-row';
    klRow.innerHTML = `
      <div>
        <div class="kl-label">${leg.label}</div>
        <div class="kl-sub">εν γνώσει -<span class="kl-pct">${Math.round(lp*100)}</span>% αν κερδίσει</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="kl-stake-disp" data-kl-stake="${i}" style="display:none"></span>
        <label class="toggle-switch">
          <input type="checkbox" data-kl="${i}" ${leg.kl?'checked':''}>
          <span class="toggle-track"></span>
        </label>
      </div>`;
    klDiv.appendChild(klRow);
  });
  updateStakes();
}

function makeInput(type, value, field, i, fontSize) {
  const el = document.createElement('input');
  el.type = type; el.value = value;
  el.style.cssText = `width:100%;font-size:${fontSize};background:var(--bg3);border:0.5px solid var(--border);border-radius:6px;color:var(--text);padding:6px 8px;outline:none`;
  el.dataset.field = field; el.dataset.i = i;
  return el;
}

function updateStakes() {
  const total = getTotal(), lp = getLossPct();
  const oddsArr    = legs.map(l=>parseOdds(l.odds));
  const impliedArr = oddsArr.map(o=>o>1?1/o:0);
  const fixedArr   = legs.map((l,i)=>l.kl&&oddsArr[i]>1?klStake(oddsArr[i],total,lp):null);
  const fixedSum   = fixedArr.reduce((a,v)=>a+(v!==null?v:0),0);
  const freeImpl   = impliedArr.reduce((a,v,i)=>a+(fixedArr[i]===null?v:0),0);
  const freeTotal  = Math.max(0,total-fixedSum);
  const stakesArr  = fixedArr.map((v,i)=>v!==null?v:(freeImpl>0?(impliedArr[i]/freeImpl)*freeTotal:0));

  legs.forEach((leg,i)=>{
    const cell = document.querySelector(`[data-stake-display="${i}"]`);
    const klSp = document.querySelector(`[data-kl-stake="${i}"]`);
    if (!cell) return;
    if (leg.kl && fixedArr[i]!==null) {
      cell.style.color='var(--amber)'; cell.textContent='€'+fixedArr[i].toFixed(2);
      if(klSp){klSp.textContent='€'+fixedArr[i].toFixed(2);klSp.style.display='';}
    } else {
      cell.style.color='var(--text2)';
      cell.textContent=oddsArr.every(o=>o>1)?'€'+stakesArr[i].toFixed(2):'auto';
      if(klSp) klSp.style.display='none';
    }
  });
  document.querySelectorAll('.kl-pct').forEach(el=>el.textContent=Math.round(lp*100));
  calcResults(oddsArr,impliedArr,fixedArr,stakesArr,total,lp);
}

function calcResults(oddsArr,impliedArr,fixedArr,stakesArr,total,lp) {
  const area = document.getElementById('metricsArea');
  const movAlways = document.getElementById('movAlways');
  if (!oddsArr.every(o=>o>1)||total<=0) {
    area.style.display='none'; movAlways.style.display='block'; return;
  }
  const sumImpl   = impliedArr.reduce((a,b)=>a+b,0);
  const totalSt   = stakesArr.reduce((a,b)=>a+b,0);
  const returnsArr= stakesArr.map((s,i)=>s*oddsArr[i]);
  const netArr    = returnsArr.map(r=>r-totalSt);
  const minNet    = Math.min(...netArr), maxNet=Math.max(...netArr);
  const isArb     = minNet>-0.01;
  const klCount   = legs.filter(l=>l.kl).length;

  lastCalc = {oddsArr,impliedArr,fixedArr,stakesArr,netArr,totalSt,returnsArr,sumImpl,total,lp,isArb,klCount};

  area.style.display=''; movAlways.style.display='none';

  document.getElementById('metricsGrid').innerHTML=`
    <div class="metric-card"><div class="mlabel">Implied συνολικά</div><div class="mvalue" style="font-size:20px">${(sumImpl*100).toFixed(2)}%</div></div>
    <div class="metric-card"><div class="mlabel">Margin book</div><div class="mvalue" style="font-size:20px">${((sumImpl-1)*100).toFixed(2)}%</div></div>
    <div class="metric-card ${maxNet>=-0.01?'green':'red'}"><div class="mlabel">Καλύτερο</div><div class="mvalue">${maxNet>=0?'+':''}€${maxNet.toFixed(2)}</div></div>
    <div class="metric-card ${minNet>=-0.01?'green':klCount>0?'amber':'red'}"><div class="mlabel">Χειρότερο</div><div class="mvalue">${minNet>=0?'+':''}€${minNet.toFixed(2)}</div></div>`;

  const badge=document.getElementById('statusBadge');
  badge.innerHTML=isArb
    ?'<div class="status-badge arb">✓ Arb — κέρδος εγγυημένο</div>'
    :klCount>0
    ?`<div class="status-badge partial">⚡ Ελεγχόμενη έκθεση — ${klCount} σημείο${klCount>1?'α':''} εν γνώσει</div>`
    :'<div class="status-badge noarb">✕ Χωρίς arb</div>';

  let html=`<thead><tr><th>Αποτέλεσμα</th><th>Book</th><th>Απόδ.</th><th>Ποντ.</th><th>Net P/L</th><th>Τύπος</th></tr></thead><tbody>`;
  legs.forEach((leg,i)=>{
    const net=netArr[i], isKL=leg.kl;
    const nc=isKL?'net-warn':net>=-0.01?'net-pos':'net-neg';
    const pill=isKL?`<span class="type-pill type-kl">-${Math.round(lp*100)}%</span>`:`<span class="type-pill type-auto">auto</span>`;
    html+=`<tr><td><div style="font-weight:500">${leg.label}</div></td><td style="color:var(--text2)">${leg.book||'—'}</td><td style="font-weight:600">${oddsArr[i].toFixed(2)}</td><td style="font-weight:600">€${stakesArr[i].toFixed(2)}</td><td class="${nc}">${net>=0?'+':''}€${net.toFixed(2)}</td><td>${pill}</td></tr>`;
  });
  document.getElementById('resultsTable').innerHTML=html+'</tbody>';

  const books=[...new Set(legs.map(l=>l.book).filter(Boolean))];
  document.getElementById('footnote').textContent=isArb
    ?(books.length>=2?`Multi-book dutch μεταξύ ${books.join(', ')}.`:'Προσοχή: ίδιο book παντού.')
    :klCount>0?`Σημεία "εν γνώσει" → ζημιά ακριβώς -${Math.round(lp*100)}% (€${(total*lp).toFixed(2)}) αν κερδίσουν.`
    :'Δεν υπάρχει arb.';
}

// ── Events: inputs ──
document.getElementById('legsContainer').addEventListener('input',e=>{
  const el=e.target, i=parseInt(el.dataset.i), f=el.dataset.field;
  if(f!==undefined) legs[i][f]=el.value;
  updateStakes();
});
document.getElementById('klToggles').addEventListener('change',e=>{
  const el=e.target, i=parseInt(el.dataset.kl);
  if(!isNaN(i)){legs[i].kl=el.checked; updateStakes();}
});
document.getElementById('market').addEventListener('change',()=>{
  legs=JSON.parse(JSON.stringify(document.getElementById('market').value==='2'?D2:D3));
  buildUI();
});
document.getElementById('totalStake').addEventListener('input',updateStakes);
document.getElementById('lossPercent').addEventListener('input',updateStakes);
document.getElementById('addLegBtn').addEventListener('click',()=>{
  const names=['H','X','A','4','5','6'];
  legs.push({label:names[legs.length]||String(legs.length+1),book:'',odds:'2.00',kl:false});
  buildUI();
});

// ── Modal helpers ──
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('[data-close]').forEach(btn=>{
  btn.addEventListener('click',()=>closeModal(btn.dataset.close));
});
document.querySelectorAll('.modal-overlay').forEach(ov=>{
  ov.addEventListener('click',e=>{if(e.target===ov)ov.classList.remove('open');});
});

// ── Record modal ──
document.getElementById('btnRecord').addEventListener('click',()=>{
  if(!lastCalc) return;
  selectedWinner=null;
  const grid=document.getElementById('winnerGrid');
  grid.innerHTML='';
  legs.forEach((leg,i)=>{
    const btn=document.createElement('button');
    btn.className='winner-btn';
    btn.dataset.i=i;
    btn.innerHTML=`${leg.label} <span style="color:var(--text2);font-size:11px">${leg.book||''}</span><span class="wb-odds">${parseOdds(leg.odds).toFixed(2)}</span>`;
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.winner-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedWinner=i;
    });
    grid.appendChild(btn);
  });
  openModal('modalRecord');
});

document.getElementById('btnSubmitRecord').addEventListener('click',async()=>{
  if(selectedWinner===null){showToast('Επέλεξε νικητή','err');return;}
  if(!lastCalc){showToast('Κάνε πρώτα υπολογισμό','err');return;}
  const i=selectedWinner;
  const leg=legs[i];
  const market=document.getElementById('market').options[document.getElementById('market').selectedIndex].text;
  const payload={
    type:'bet',
    timestamp:new Date().toISOString(),
    match:document.getElementById('recMatch').value||'—',
    market,
    totalStake:Math.round(lastCalc.totalSt*100)/100,
    winner:leg.label,
    odds:parseOdds(leg.odds),
    netPL:Math.round(lastCalc.netArr[i]*100)/100,
    betType:leg.kl?`εν γνώσει -${Math.round(lastCalc.lp*100)}%`:'αυτόματο',
    note:document.getElementById('recNote').value
  };
  await submitToSheet(payload,'modalRecord','btnSubmitRecord');
});

// ── Movement modal ──
[document.getElementById('btnMovement'),document.getElementById('btnMovementAlways')].forEach(btn=>{
  btn.addEventListener('click',()=>{
    movType='dep';
    document.getElementById('movDep').classList.add('sel');
    document.getElementById('movWit').classList.remove('sel');
    document.getElementById('movAmount').value='';
    document.getElementById('movNote').value='';
    openModal('modalMovement');
  });
});
document.getElementById('movDep').addEventListener('click',()=>{
  movType='dep';
  document.getElementById('movDep').classList.add('sel');
  document.getElementById('movWit').classList.remove('sel');
});
document.getElementById('movWit').addEventListener('click',()=>{
  movType='wit';
  document.getElementById('movWit').classList.add('sel');
  document.getElementById('movDep').classList.remove('sel');
});

document.getElementById('btnSubmitMovement').addEventListener('click',async()=>{
  const amt=parseFloat(document.getElementById('movAmount').value);
  if(!amt||amt<=0){showToast('Βάλε ποσό','err');return;}
  const payload={
    type:'movement',
    timestamp:new Date().toISOString(),
    movType:movType==='dep'?'Κατάθεση':'Ανάληψη',
    amount:movType==='dep'?amt:-amt,
    note:document.getElementById('movNote').value
  };
  await submitToSheet(payload,'modalMovement','btnSubmitMovement');
});

// ── Sheet submit via Image trick (CORS-safe) ──
function submitToSheet(payload, modalId, btnId) {
  return new Promise((resolve) => {
    const btn = document.getElementById(btnId);
    btn.disabled = true; btn.textContent = 'Αποστολή...';

    const url = SCRIPT_URL + '?data=' + encodeURIComponent(JSON.stringify(payload));

    const done = () => {
      showToast('✓ Αποθηκεύτηκε στο Sheet!', 'ok');
      closeModal(modalId);
      btn.disabled = false; btn.textContent = 'Αποθήκευση στο Sheet';
      resolve();
    };

    const img = new Image();
    img.onload = done;
    img.onerror = done; // fires even on redirect — still means request was sent
    setTimeout(done, 5000); // fallback
    img.src = url;
  });
}

// ── Toast ──
function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'),2800);
}

buildUI();
</script>
